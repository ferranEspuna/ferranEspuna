<script>
    document.addEventListener("DOMContentLoaded", function () {
        const checkboxes = document.querySelectorAll('.task-list-item input[type="checkbox"]');
        const pageKey = window.location.pathname;

        checkboxes.forEach((checkbox, index) => {
            const storageKey = `checkbox-state-${pageKey}-${index}`;

            // Enable the checkbox
            checkbox.removeAttribute('disabled');

            // Load persisted state
            const persistedState = localStorage.getItem(storageKey);
            if (persistedState === 'true') {
                checkbox.checked = true;
            } else if (persistedState === 'false') {
                checkbox.checked = false;
            }

            // Sync parent checked class on load
            const parentLi = checkbox.parentElement;
            if (parentLi) {
                if (checkbox.checked) {
                    parentLi.classList.add('checked');
                } else {
                    parentLi.classList.remove('checked');
                }

                // Make the entire row clickable to toggle the checkbox
                parentLi.addEventListener('click', function (e) {
                    // If the user clicked directly on the checkbox, let the default event handle it
                    if (e.target === checkbox) return;
                    
                    // Otherwise, toggle the checkbox value and dispatch change event
                    checkbox.checked = !checkbox.checked;
                    checkbox.dispatchEvent(new Event('change'));
                });
            }

            // Add change listener to save state and update style class
            checkbox.addEventListener('change', function () {
                localStorage.setItem(storageKey, checkbox.checked);
                if (parentLi) {
                    if (checkbox.checked) {
                        parentLi.classList.add('checked');
                    } else {
                        parentLi.classList.remove('checked');
                    }
                }
            });
        });
    });
</script>
